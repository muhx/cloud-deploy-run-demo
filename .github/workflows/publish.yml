name: Publish to Artifact Registry

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      custom_tag:
        description: "Extra image tag to apply (optional, e.g. staging)"
        required: false
        type: string
      push:
        description: "Push to Artifact Registry (uncheck for a build-only dry run)"
        required: false
        type: boolean
        default: true

# Required for Workload Identity Federation (keyless auth to GCP).
permissions:
  contents: read
  id-token: write

env:
  # Non-secret config — set these as repository Variables (Settings → Secrets and variables → Actions → Variables).
  GAR_LOCATION: ${{ vars.GAR_LOCATION }}        # e.g. us-central1
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}    # e.g. my-gcp-project
  GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY }}    # e.g. docker-images
  IMAGE_NAME: cloud-deploy-run-demo

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        # Skip auth on a manual build-only dry run.
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.push }}
        uses: google-github-actions/auth@v2
        with:
          # Direct Workload Identity Federation — no service account impersonation.
          # WIF provider format:
          # projects/<PROJECT_NUMBER>/locations/global/workloadIdentityPools/<POOL>/providers/<PROVIDER>
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}

      - name: Configure Docker for Artifact Registry
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.push }}
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image path and tags
        id: meta
        env:
          CUSTOM_TAG: ${{ inputs.custom_tag }}
        run: |
          IMAGE="${GAR_LOCATION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/${IMAGE_NAME}"
          SHA="$(git rev-parse --short HEAD)"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

          # Always tag with the short SHA and latest; add the manual custom tag if provided.
          {
            echo "tags<<EOF"
            echo "${IMAGE}:${SHA}"
            echo "${IMAGE}:latest"
            if [ -n "${CUSTOM_TAG}" ]; then echo "${IMAGE}:${CUSTOM_TAG}"; fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          # Push unless this is a manual build-only dry run.
          push: ${{ github.event_name != 'workflow_dispatch' || inputs.push }}
          build-args: |
            COMMIT_SHA=${{ steps.meta.outputs.sha }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        env:
          PUSHED: ${{ github.event_name != 'workflow_dispatch' || inputs.push }}
          CUSTOM_TAG: ${{ inputs.custom_tag }}
        run: |
          if [ "$PUSHED" = "true" ]; then
            echo "### Published image" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Built image (dry run — not pushed)" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "- \`${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ steps.meta.outputs.image }}:latest\`" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "$CUSTOM_TAG" ]; then
            echo "- \`${{ steps.meta.outputs.image }}:${CUSTOM_TAG}\`" >> "$GITHUB_STEP_SUMMARY"
          fi
