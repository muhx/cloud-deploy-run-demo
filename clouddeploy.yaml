apiVersion: deploy.cloud.google.com/v1
kind: DeliveryPipeline
metadata:
  name: muhx-cloud-deploy-run-demo-pipeline
description: muhx cloud-deploy-run-demo pipeline
serialPipeline:
  stages:
  - targetId: staging
    profiles: [staging]
  - targetId: production
    profiles: [production]
    strategy:
      canary:
        runtimeConfig:
          cloudRun:
            automaticTrafficControl: true
        canaryDeployment:
          percentages: [50,75]
          verify: false

---
apiVersion: deploy.cloud.google.com/v1
kind: Target
metadata:
  name: staging
description: muhx cloud-deploy-run-demo staging
run:
  location: projects/id-rd-sa-muhamad-rohman/locations/us-central1

---
apiVersion: deploy.cloud.google.com/v1
kind: Target
metadata:
  name: production
description: muhx cloud-deploy-run-demo production
requireApproval: true
run:
  location: projects/id-rd-sa-muhamad-rohman/locations/us-central1


